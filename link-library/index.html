<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinity Hues Biblioteca de Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="card app-header">
      <a class="back-link" href="../">← Volver al hub</a>
      <div class="brand-block" aria-label="Logo Infinity Hues">
        <div class="brand-logo" role="img" aria-label="IH">IH</div>
        <div>
          <h1>Biblioteca de Links</h1>
          <p>Guarda, busca y reutiliza enlaces estratégicos sin backend.</p>
        </div>
      </div>
    </header>

    <section class="grid-top">
      <article class="card">
        <h2 id="form-title">Nuevo link</h2>
        <form id="link-form" novalidate>
          <input id="link-id" type="hidden" />

          <label for="link-title">Título</label>
          <input id="link-title" type="text" required placeholder="Ej. Documentación oficial de CSS Grid" />

          <label for="link-url">URL</label>
          <input id="link-url" type="url" required placeholder="https://..." />

          <label for="link-category">Categoría</label>
          <input id="link-category" type="text" placeholder="Ej. Desarrollo" />

          <label for="link-tags">Etiquetas (separadas por coma)</label>
          <input id="link-tags" type="text" placeholder="frontend, css, referencia" />

          <label for="link-notes">Notas</label>
          <textarea id="link-notes" rows="4" placeholder="Resumen rápido del recurso..."></textarea>

          <p id="form-message" class="form-message" role="alert" aria-live="polite"></p>

          <div class="actions-row">
            <button type="submit" class="btn primary">Guardar link</button>
            <button id="cancel-edit" type="button" class="btn ghost hidden">Cancelar edición</button>
          </div>
        </form>
      </article>

      <article class="card">
        <h2>Gestión de datos</h2>
        <p class="helper">Todo se guarda en <code>localStorage</code> de tu navegador.</p>
        <div class="tool-actions">
          <button id="export-json" type="button" class="btn secondary">Exportar JSON</button>
          <label for="import-json" class="btn ghost label-btn">Importar JSON</label>
          <input id="import-json" type="file" accept="application/json" />
          <button id="export-csv" type="button" class="btn secondary">Exportar CSV</button>
          <button id="reset-library" type="button" class="btn danger">Restaurar ejemplos</button>
        </div>
        <p id="import-message" class="helper" aria-live="polite"></p>
      </article>
    </section>

    <section class="card">
      <div class="list-header">
        <h2>Links guardados</h2>
        <span id="link-count" class="count-chip">0 links</span>
      </div>

      <div class="filters">
        <input id="search-input" type="search" placeholder="Buscar por título, URL, notas o etiquetas..." />
        <input id="category-filter" type="search" placeholder="Filtrar por categoría..." />
      </div>

      <ul id="link-list" class="link-list"></ul>
      <p id="empty-state" class="helper empty">No hay links todavía.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
